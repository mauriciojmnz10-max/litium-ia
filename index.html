<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Litium • Fibra Óptica de Alta Velocidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --litium-blue: #00e5ff;
            --litium-purple: #7000ff;
            --litium-dark-bg: #030712;
            --litium-card-bg: rgba(15, 23, 42, 0.6);
            --litium-border: rgba(0, 229, 255, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--litium-dark-bg);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* FONDO DINÁMICO DE FIBRA ÓPTICA (SPEED GRADIENT) */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(112, 0, 255, 0.12) 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, rgba(0, 229, 255, 0.08) 0%, transparent 40%);
            z-index: -1;
            animation: pulseBackground 15s ease-infinite alternate;
        }

        @keyframes pulseBackground {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(5deg); }
        }

        /* BARRA SUPERIOR DE CONECTIVIDAD */
        .top-ticker {
            background: rgba(3, 7, 18, 0.9);
            border-bottom: 1px solid var(--litium-border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #fff;
        }

        .brand span {
            color: var(--litium-blue);
        }

        .ticker-rate {
            background: rgba(0, 229, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--litium-blue);
            font-weight: 600;
        }

        /* SELECTOR MULTI-MODO DE ASESORÍA (INTERFAZ DE TELECOMUNICACIONES) */
        .advisor-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.4);
            z-index: 10;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 8px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn .tab-icon {
            font-size: 18px;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.2), rgba(0, 229, 255, 0.1));
            border-color: var(--litium-blue);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
        }

        /* NÚCLEO DEL CONTENEDOR DE CONVERSACIÓN CON PADDING ADAPTATIVO EXIGIDO */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            /* SECCIÓN CLAVE AJUSTADA: Evita colisiones de la interfaz de chat en teléfonos */
            padding-bottom: 70px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14.5px;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.system-lia {
            background: var(--litium-card-bg);
            border-left: 3px solid var(--litium-purple);
            border-top: 1px solid var(--litium-border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user-client {
            background: linear-gradient(135deg, var(--litium-purple), rgba(112, 0, 255, 0.6));
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* CARDS AUTOMÁTICAS DE PRODUCTOS EN EL FEED */
        .plan-card-feed {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8), rgba(30, 41, 59, 0.8));
            border: 1px solid var(--litium-border);
            border-radius: 14px;
            padding: 15px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .plan-title {
            font-weight: 700;
            color: #fff;
        }

        .plan-price {
            color: var(--litium-blue);
            font-weight: 700;
        }

        .plan-action-btn {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--litium-blue);
            color: var(--litium-blue);
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .plan-action-btn:hover {
            background: var(--litium-blue);
            color: var(--litium-dark-bg);
        }

        /* INTERFAZ DE ESCRITURA FLOTANTE (FLOATING TEXT BOX) */
        .input-wrapper-floating {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(to top, var(--litium-dark-bg) 70%, transparent);
            z-index: 20;
        }

        .input-bar {
            display: flex;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--litium-border);
            border-radius: 30px;
            padding: 6px 6px 6px 18px;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .input-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14.5px;
            padding: 8px 0;
        }

        .input-bar input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--litium-blue);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* ELEMENTO FLOTANTE AGRESIVO DE WHATSAPP CON EFECTO RADIAL DE CONEXIÓN */
        .whatsapp-lead-btn {
            position: absolute;
            bottom: 85px;
            right: 20px;
            background: #25d366;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            cursor: pointer;
            z-index: 30;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
        }

        .whatsapp-lead-btn.visible {
            transform: scale(1);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .whatsapp-lead-btn svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        /* ANIMACIÓN DE CARGA PARA LA IA */
        .typing-loader {
            display: flex;
            gap: 4px;
            padding: 8px;
            align-self: flex-start;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--litium-blue);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="top-ticker">
        <div class="brand">⚡ LITIUM<span>FIBRA</span></div>
        <div class="ticker-rate" id="bcvRateDisplay">Cargando tasa BCV...</div>
    </div>

    <div class="advisor-tabs">
        <button class="tab-btn active" onclick="cambiarModo('ventas', this)">
            <span class="tab-icon">💼</span>
            <span>Planes Ventas</span>
        </button>
        <button class="tab-btn" onclick="cambiarModo('soporte', this)">
            <span class="tab-icon">🛠️</span>
            <span>Soporte Técnico</span>
        </button>
        <button class="tab-btn" onclick="cambiarModo('cobertura', this)">
            <span class="tab-icon">📍</span>
            <span>Cobertura</span>
        </button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message system-lia">
            ¡Hola! 👋 Bienvenido al canal inteligente de atención de <strong>Litium</strong>. Soy Lia, tu asesora experta en conectividad corporativa y de hogar. ¿En qué zona de Caracas o Maracay deseas validar factibilidad técnica hoy o qué velocidad de navegación requieres?
        </div>
    </div>

    <div class="whatsapp-lead-btn" id="whatsappLead" onclick="redirigirWhatsApp()">
        <svg viewBox="0 0 24 24">
            <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.455L0 24zm6.59-4.846c1.6.95 3.498 1.451 5.411 1.452 5.435 0 9.855-4.42 9.858-9.855.002-2.633-1.025-5.105-2.89-6.973C17.16 1.908 14.685.882 12.052.882c-5.44 0-9.859 4.418-9.862 9.853-.001 1.908.5 3.766 1.448 5.378l-.965 3.529 3.618-.948zm11.067-5.472c-.307-.154-1.817-.897-2.097-.998-.28-.103-.483-.154-.686.154-.203.308-.785.998-.962 1.198-.177.202-.353.226-.66.074-.307-.154-1.3-.48-2.477-1.532-.915-.817-1.533-1.827-1.713-2.135-.18-.307-.019-.473.135-.626.139-.138.307-.359.461-.538.154-.18.205-.308.307-.513.102-.206.051-.385-.026-.538-.077-.154-.686-1.654-.939-2.261-.247-.594-.499-.514-.686-.523-.177-.008-.38-.012-.583-.012-.203 0-.533.077-.812.384-.279.308-1.066 1.043-1.066 2.545 0 1.502 1.092 2.953 1.244 3.157.152.204 2.148 3.28 5.203 4.602.726.313 1.291.501 1.733.641.73.232 1.393.2 1.918.122.585-.088 1.817-.743 2.071-1.46.255-.718.255-1.334.178-1.462-.077-.128-.279-.204-.586-.359z"/>
        </svg>
    </div>

    <div class="input-wrapper-floating">
        <div class="input-bar">
            <input type="text" id="userInput" placeholder="Escribe tu consulta sobre nuestra fibra..." onkeydown="if(event.key === 'Enter') enviarMensaje()">
            <button class="send-btn" onclick="enviarMensaje()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#030712" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE APIS EN PRODUCCIÓN EN LA RED
        const API_BASE_URL = "https://litium-backend-d2pb.onrender.com"; // Reemplazar por tu url de Render de Litium
        let modoAsesorActual = "ventas";
        let historialConversacion = [];
        let tasaCambiariaGlobal = 60.00;

        // PLANES HARCODED EN EL FRONTEND PARA INTEGRACIÓN EN CARDS LOCALES
        const planesLocales = [
            { id: "l1", nombre: "Plan Hogar Inicial", velocidad: "100 Mbps", precio: 25 },
            { id: "l2", nombre: "Plan Hogar Pro", velocidad: "300 Mbps", precio: 40 },
            { id: "l3", nombre: "Plan Litium Simétrico", velocidad: "600 Mbps", precio: 60 }
        ];

        // ACTUALIZACIÓN DE INTERFAZ CAMBIARIA
        async function inicializarTasa() {
            try {
                const res = await fetch(`${API_BASE_URL}/tasa-bcv`);
                if (res.ok) {
                    const data = await res.json();
                    tasaCambiariaGlobal = parseFloat(data.tasa);
                    document.getElementById("bcvRateDisplay").innerText = `Tasa Oficial BCV: ${tasaCambiariaGlobal.toFixed(2)} Bs.`;
                }
            } catch (err) {
                console.error("Error cargando tasa cambiaria primaria, usando resguardo:", err);
                document.getElementById("bcvRateDisplay").innerText = `Tasa de Resguardo BCV: ${tasaCambiariaGlobal.toFixed(2)} Bs.`;
            }
        }

        // CONTROLADOR DE PESTAÑAS (MODOS ASESOR)
        function cambiarModo(nuevoModo, elemento) {
            modoAsesorActual = nuevoModo;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
            
            let systemMsg = "";
            if(nuevoModo === "ventas") systemMsg = "✨ Has cambiado al módulo de <strong>Ventas</strong>. ¿Cuál de nuestros planes de alta velocidad te interesa contratar hoy?";
            if(nuevoModo === "soporte") systemMsg = "🛠️ Has ingresado al módulo de <strong>Soporte Técnico</strong>. Cuéntame qué inconveniente presenta tu navegación para guiarte en el reinicio o agendar soporte.";
            if(nuevoModo === "cobertura") systemMsg = "📍 Has activado el módulo de <strong>Cobertura</strong>. Indícame tu sector en Caracas o Maracay para validar factibilidad instantánea.";
            
            const chatContainer = document.getElementById("chatContainer");
            const notification = document.createElement("div");
            notification.className = "message system-lia";
            notification.innerHTML = systemMsg;
            chatContainer.appendChild(notification);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // SECCIÓN LÓGICA DE INTERFAZ DE CONVERSACIÓN (FETCH EN RUTA)
        async function enviarMensaje() {
            const inputElement = document.getElementById("userInput");
            const mensajeTexto = inputElement.value.trim();
            if (!mensajeTexto) return;

            inputElement.value = "";
            const chatContainer = document.getElementById("chatContainer");

            // Imprimir mensaje del usuario
            const userDiv = document.createElement("div");
            userDiv.className = "message user-client";
            userDiv.innerText = mensajeTexto;
            chatContainer.appendChild(userDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Inyectar cargador visual animado
            const loaderDiv = document.createElement("div");
            loaderDiv.className = "typing-loader";
            loaderDiv.id = "liaLoader";
            loaderDiv.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
            chatContainer.appendChild(loaderDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const peticion = await fetch(`${API_BASE_URL}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        mensaje: mensajeTexto,
                        historial: historialConversacion,
                        modo_asesor: modoAsesorActual
                    })
                });

                document.getElementById("liaLoader").remove();

                if (peticion.ok) {
                    const respuestaJson = await peticion.json();
                    
                    const liaDiv = document.createElement("div");
                    liaDiv.className = "message system-lia";
                    liaDiv.innerHTML = respuestaJson.respuesta.replace(/\n/g, "<br>");
                    chatContainer.appendChild(liaDiv);

                    // Si el usuario pregunta por planes en el modo ventas, inyectamos cards interactivas del localStorage
                    if (modoAsesorActual === "ventas" && (mensajeTexto.toLowerCase().includes("plan") || mensajeTexto.toLowerCase().includes("precio"))) {
                        inyectarCardsDeVenta(chatContainer);
                    }

                    // Sincronizar historial local
                    historialConversacion.push({ role: "user", content: mensajeTexto });
                    historialConversacion.push({ role: "assistant", content: respuestaJson.respuesta });

                    // Control del disparador de WhatsApp flotante
                    if (respuestaJson.mostrar_whatsapp) {
                        document.getElementById("whatsappLead").classList.add("visible");
                    }
                } else {
                    throw new Error("Respuesta de servidor fallida.");
                }
            } catch (error) {
                if(document.getElementById("liaLoader")) document.getElementById("liaLoader").remove();
                const errorDiv = document.createElement("div");
                errorDiv.className = "message system-lia";
                errorDiv.style.borderLeftColor = "#ef4444";
                errorDiv.innerHTML = "❌ Disculpa el inconveniente, mi nodo central de procesamiento experimenta latencia. Por favor reintenta en un momento.";
                chatContainer.appendChild(errorDiv);
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // INTERACTIVIDAD Y PERSISTENCIA (LOCALSTORAGE)
        function inyectarCardsDeVenta(contenedor) {
            planesLocales.forEach(p => {
                const card = document.createElement("div");
                card.className = "plan-card-feed";
                const precioBs = p.precio * tasaCambiariaGlobal;
                card.innerHTML = `
                    <div class="plan-header">
                        <span class="plan-title">⚡ ${p.nombre} (${p.velocidad})</span>
                        <span class="plan-price">$${p.precio} / ${precioBs.toFixed(2)} Bs</span>
                    </div>
                    <button class="plan-action-btn" onclick="guardarInteresPlan('${p.id}', '${p.nombre}')">Me interesa este plan</button>
                `;
                contenedor.appendChild(card);
            });
        }

        function guardarInteresPlan(id, nombre) {
            let serviciosInteres = JSON.parse(localStorage.getItem("litium_interes")) || [];
            if (!serviciosInteres.some(item => item.id === id)) {
                serviciosInteres.push({ id, nombre, fecha: new Date() });
                localStorage.setItem("litium_interes", JSON.stringify(serviciosInteres));
            }
            document.getElementById("whatsappLead").classList.add("visible");
            
            // Alerta sutil dentro del chat box
            const chatContainer = document.getElementById("chatContainer");
            const alertDiv = document.createElement("div");
            alertDiv.className = "message system-lia";
            alertDiv.style.borderLeftColor = "var(--litium-blue)";
            alertDiv.innerHTML = `📌 He añadido el <strong>${nombre}</strong> a tu orden de interés. Puedes hacer clic en el botón flotante de WhatsApp inferior para agendar la instalación.`;
            chatContainer.appendChild(alertDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // DIRECCIONAMIENTO ESTRATÉGICO CON URL ENCODE
        function redirigirWhatsApp() {
            const numeroSoporte = "+584120000000";
            let planesInteres = JSON.parse(localStorage.getItem("litium_interes")) || [];
            
            let mensajeEstructurado = `⚡ *Solicitud de Servicio - Litium Fibra* %0A`;
            mensajeEstructurado += `Modo de consulta: ${modoAsesorActual.toUpperCase()} %0A%0A`;
            
            if (planesInteres.length > 0) {
                mensajeEstructurado += `*Planes de Interés Seleccionados:* %0A`;
                planesInteres.forEach(p => {
                    mensajeEstructurado += `• ${p.nombre} %0A`;
                });
                mensajeEstructurado += `%0A_Deseo validar factibilidad de instalación en mi zona._`;
            } else {
                mensajeEstructurado += `_Hola, estuve conversando con Lia en la plataforma web y requiero atención personalizada inmediata de un ejecutivo comercial._`;
            }
            
            window.open(`https://api.whatsapp.com/send?phone=${numeroSoporte}&text=${mensajeEstructurado}`, "_blank");
            
            // Vaciar estados posterior al envío
            localStorage.removeItem("litium_interes");
            document.getElementById("whatsappLead").classList.remove("visible");
        }

        window.onload = () => {
            inicializarTasa();
        };
    </script>
</body>
</html>
